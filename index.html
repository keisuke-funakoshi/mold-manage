  <script>
  // xlsxをrequire("xlsx")で取得できるようにshim
  var require = function(mod) {
    if (mod === "xlsx") return window.XLSX || {};
    throw new Error("Module not found: " + mod);
  };
  // xlsxがブロックされた場合のフォールバック
  window.addEventListener("DOMContentLoaded", function() {
    if (!window.XLSX) {
      console.warn("xlsx CDN blocked. Excel import/export will be disabled.");
      window.XLSX = {
        read: function() { alert("Excel機能はこのブラウザ設定では利用できません"); return null; },
        utils: { sheet_to_json: function(){return[];}, json_to_sheet: function(){return{};}, book_new: function(){return{SheetNames:[],Sheets:{}};}, book_append_sheet: function(){} },
        writeFile: function() { alert("Excel出力はこのブラウザ設定では利用できません"); }
      };
    }
  });
  </script>
