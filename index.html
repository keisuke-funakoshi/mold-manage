// resolveCategory determines the displayed category based on:
// 1. ledgerFlag (registered in fixed-asset ledger) -> always "fixed", regardless of price
// 2. otherwise, acquirePrice is empty/unknown -> "unknown"
// 3. otherwise, acquirePrice >= threshold -> "fixed_tentative" (provisional, pending ledger import)
// 4. otherwise -> "minor"
function resolveCategory(asset) {
  if (asset.ledgerFlag) return "fixed";
  if (asset.acquirePrice === "" || asset.acquirePrice === null || asset.acquirePrice === undefined) return "unknown";
  const price = Number(asset.acquirePrice);
  if (!Number.isNaN(price) && price >= MINOR_ASSET_THRESHOLD) return "fixed_tentative";
  return "minor";
}

    return {
      id: r.id,
      name: r.name || "（名称未登録）",
      seriesName: r.seriesName || "",
      location: r.location || "（保管場所未登録）",
      ledgerFlag: false,
      status: r.status === "disposal" ? "in_use" : r.status, // 廃棄予定はフラグに移行

      lentTo: "",

function yen(v) {
  if (v === "" || v === null || v === undefined) return "—";
  return "¥" + Number(v).toLocaleString("ja-JP");
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date("2026-06-18");
  const target = new Date(dateStr);
  return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
}

    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      background: s.bg, color: s.fg, fontSize: 12.5, fontWeight: 600,
      padding: "4px 10px", borderRadius: 100, whiteSpace: "nowrap",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: s.dot }} />
      {s.label}
    </span>
  );
}

function CategoryTag({ category }) {
  const c = CATEGORY[category] || CATEGORY["unknown"];
  const isMinor = category === "minor";
  const isTentative = category === "fixed_tentative";
  const isUnknown = category === "unknown";
  return (
    <span title={c.sub} style={{
      fontSize: 11.5, fontWeight: 700, letterSpacing: 0.3,
      color: isUnknown ? "#6B6B6B" : isMinor ? "#5B6470" : (isTentative ? "#8A6A1E" : "#8A5A1E"),
      background: isUnknown ? "#E8E8E8" : isMinor ? "#EEF0F2" : (isTentative ? "#F7F0DD" : "#F7EDDD"),
      padding: "3px 8px", borderRadius: 5,
      border: isUnknown ? "1px dashed #ABABAB" : isTentative ? "1px dashed #D8C284" : "none",
    }}>
      {c.label}
    </span>
  );
}

// ---------- Main App ----------
function MoldManagerApp() {
  const [assets, setAssets] = useState(seedAssets);
  const [storageReady, setStorageReady] = useState(false);
  const [query, setQuery] = useState("");
  // 各フィルタは選択された値の配列。空配列 = 絞り込みなし（すべて表示）。
  // 同一カテゴリ内は配列内のいずれかに合致(OR)、カテゴリ間はAND。
  const [statusFilter, setStatusFilter] = useState([]);
  const [categoryFilter, setCategoryFilter] = useState([]);
  const [supplierFilter, setSupplierFilter] = useState([]);
  const [storageFeeFilter, setStorageFeeFilter] = useState([]); // 値は "paid" | "unpaid"
  const [showFilters, setShowFilters] = useState(false);
  const [selectedId, setSelectedId] = useState(null);
  const [editing, setEditing] = useState(null); // asset object being edited, or null
  const [isNew, setIsNew] = useState(false);
  const [viewMode, setViewMode] = useState("cards"); // cards | table
  const [toast, setToast] = useState(null);
  const [showLedgerImport, setShowLedgerImport] = useState(false);
  const [showExcelUpload, setShowExcelUpload] = useState(false);
  const [showRetirementImport, setShowRetirementImport] = useState(false);

  // ストレージから保存済みの変動データを読み込む（初回のみ）
  React.useEffect(() => {
    (() => {
      try {
        const raw = localStorage.getItem("mold-app-state");
        if (raw) {
          const saved = JSON.parse(raw);
          // 保存済みの変動データ（型番をキーにしたmap）をseedAssetsにマージ
          setAssets(prev => prev.map(a => {
            const s = saved[a.id];
            if (!s) return a;
            return { ...a, ...s };
          }));
        }
      } catch (e) {
        // ストレージ未対応環境では無視
      } finally {
        setStorageReady(true);
      }
    })();
  }, []);

  // assetsが変化するたびに変動データをストレージへ保存
  React.useEffect(() => {
    if (!storageReady) return;
    // 変動フィールドのみ抽出してコンパクトに保存
    const toSave = {};
    assets.forEach(a => {
      const diff = {};
      if (a.storageFeePaid) diff.storageFeePaid = true;
      if (a.disposalPending) diff.disposalPending = true;
      if (a.ledgerFlag) diff.ledgerFlag = true;
      if (a.usefulLife !== "" && a.usefulLife !== [5,7,10][0]) diff.usefulLife = a.usefulLife;
      if (a.history) diff.history = a.history;
      if (a.nextMaintenance) diff.nextMaintenance = a.nextMaintenance;
      // 手動編集された可能性がある項目（名前・保管場所・サプライヤ名）も保存
      if (a.name !== "（名称未登録）") diff.name = a.name;
      if (a.location !== "（保管場所未登録）") diff.location = a.location;
      if (a.maker !== "（サプライヤ未登録）") diff.maker = a.maker;
      if (a.series) diff.series = a.series;
      if (Object.keys(diff).length > 0) toSave[a.id] = diff;
    });
    try {
      localStorage.setItem("mold-app-state", JSON.stringify(toSave));
    } catch (e) {}
  }, [assets, storageReady]);

  function toggleFilterValue(setFn, value) {
    setFn(prev => prev.includes(value) ? prev.filter(v => v !== value) : [...prev, value]);
  }

  function exportToExcel() {
    const CATEGORY_LABEL = { fixed: "固定資産", fixed_tentative: "非固定資産", minor: "少額資産" };
    const rows = filtered.map(a => ({
      "型番": a.id,
      "商品シリーズ": a.seriesName || "",
      "資産名": a.name,
      "サプライヤ名": a.maker,
      "保管場所": a.location,
      "資産区分": CATEGORY_LABEL[resolveCategory(a)] || "",
      "ステータス": a.disposalPending ? "廃棄予定" : (STATUS[a.status]?.label || a.status),
      "除却日": a.retiredDate || "",
      "取得日": a.acquireDate,
      "取得価格": a.acquirePrice !== "" ? a.acquirePrice : "",
      "耐用年数": a.usefulLife !== "" ? a.usefulLife : "",
      "サイズ": a.size,
      "保管料対象": a.storageFeeApplicable ? "○" : "",
      "保管料支払済み": a.storageFeeApplicable && a.storageFeePaid ? "○" : "",
      "固定資産台帳登録": a.ledgerFlag ? "○" : "",
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "金型一覧");
    const today = new Date().toISOString().slice(0, 10).replace(/-/g, "");
    XLSX.writeFile(wb, `金型管理_${today}.xlsx`);
  }

  const activeFilterCount = statusFilter.length + categoryFilter.length + supplierFilter.length + storageFeeFilter.length;

  const filtered = useMemo(() => {
    return assets.filter(a => {
      if (statusFilter.length > 0) {
        const effectiveStatus = a.disposalPending ? "disposal" : a.status;
        if (!statusFilter.includes(effectiveStatus)) return false;
      }
      if (categoryFilter.length > 0 && !categoryFilter.includes(resolveCategory(a))) return false;
      if (supplierFilter.length > 0 && !supplierFilter.includes(a.maker)) return false;
      if (storageFeeFilter.length > 0) {
        const paidMatch = storageFeeFilter.includes("paid") && a.storageFeeApplicable && a.storageFeePaid;
        const unpaidMatch = storageFeeFilter.includes("unpaid") && a.storageFeeApplicable && !a.storageFeePaid;
        if (!paidMatch && !unpaidMatch) return false;
      }
      if (query.trim()) {
        const q = query.trim().toLowerCase();
        const hay = `${a.id} ${a.name} ${a.seriesName} ${a.location} ${a.maker}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [assets, query, statusFilter, categoryFilter, supplierFilter, storageFeeFilter]);

  const upcomingMaintenance = useMemo(() => {
    return assets
      .map(a => ({ ...a, days: daysUntil(a.nextMaintenance) }))
      .filter(a => a.days !== null && a.days <= 30 && a.days >= -9999)
      .sort((a, b) => a.days - b.days)
      .slice(0, 5);
  }, [assets]);

  const availableSuppliers = useMemo(() => {
    return [...new Set(assets.map(a => a.maker).filter(Boolean))].sort();
  }, [assets]);

  const stats = useMemo(() => {
    const fixed = assets.filter(a => resolveCategory(a) === "fixed").length;
    const tentative = assets.filter(a => resolveCategory(a) === "fixed_tentative").length;
    const minor = assets.filter(a => resolveCategory(a) === "minor").length;
    const unknown = assets.filter(a => resolveCategory(a) === "unknown").length;
    const retired = assets.filter(a => a.status === "retired" && !a.disposalPending).length;
    const disposal = assets.filter(a => a.disposalPending).length;
    const unpaidStorage = assets.filter(a => a.storageFeeApplicable && !a.storageFeePaid).length;
    return { total: assets.length, fixed, tentative, minor, unknown, retired, disposal, unpaidStorage };
  }, [assets]);

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  }, []);

  const selectedAsset = assets.find(a => a.id === selectedId) || null;

  // 固定資産台帳Excelファイルを読み込み、型番を照合してledgerFlagをONにする
  async function importLedgerFile(file) {
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

      // 先頭ゼロを除去した正規化キーで台帳IDマップを構築
      // 列12=資産番号・親、列15=資産状態区分、列62=取得価額、列64=耐用年数
      const norm = s => String(s).trim().replace(/^0+/, "") || String(s).trim();
      const ledgerMap = {}; // normKey -> { id, statusRaw, price, usefulLife }
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        const id = r[12];
        if (!id) continue;
        const nk = norm(id);
        if (!ledgerMap[nk]) {
          ledgerMap[nk] = {
            id: String(id),
            statusRaw: r[15] || "",
            usefulLife: typeof r[64] === "number" ? r[64] : "",
          };
        }
      }

      let matched = 0, enriched = 0;
      setAssets(prev => prev.map(a => {
        const nk = norm(a.id);
        const info = ledgerMap[nk];
        if (!info) return a;
        matched++;
        const updated = { ...a, ledgerFlag: true };
        // 耐用年数：未入力の場合のみ補完
        if ((updated.usefulLife === "" || updated.usefulLife === null) && info.usefulLife) {
          updated.usefulLife = info.usefulLife;
          enriched++;
        }
        return updated;
      }));

      setShowLedgerImport(false);
      const enrichedNote = enriched > 0 ? `、${enriched}件の耐用年数を補完` : "";
      showToast(`✅ 台帳照合完了：${matched}件が固定資産に確定${enrichedNote}`);
    } catch (e) {
      showToast(`⚠️ 読み込みエラー：${e.message}`);
    }
  }

  // 資産減少明細Excelファイルを読み込み、該当資産に除却日フラグを立てる
  async function importRetirementFile(file) {
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const norm = s => String(s).trim().replace(/^0+/, "") || String(s).trim();

      const parseDate = v => {
        if (!v) return "";
        const s = typeof v === "number" ? String(Math.round(v)) : String(v).trim();
        if (s.length === 8 && /^\d{8}$/.test(s)) {
          try { return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`; } catch { return ""; }
        }
        // Excelシリアル値
        if (typeof v === "number" && v > 30000 && v < 60000) {
          const d = new Date(Math.round((v - 25569) * 86400 * 1000));
          return d.toISOString().slice(0, 10);
        }
        return "";
      };

      // 全シートから資産番号と除却日を収集
      const retirementMap = {}; // normKey -> retiredDate
      for (const sheetName of wb.SheetNames) {
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
        if (rows.length < 2) continue;
        const header = rows[0];

        // ヘッダーから列位置を自動判定
        const assetCol = header.findIndex(h => String(h).includes("資産番号") && !String(h).includes("枝") && !String(h).includes("親一意"));
        const dateCol = header.findIndex(h => String(h).includes("除売却年月日") || String(h).includes("異動日付"));
        if (assetCol < 0 || dateCol < 0) continue;

        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          const aid = String(r[assetCol] || "").trim();
          const dt = parseDate(r[dateCol]);
          if (aid && aid !== "資産番号" && aid !== "資産番号・親") {
            retirementMap[norm(aid)] = dt;
          }
        }
      }

      let matched = 0;
      setAssets(prev => prev.map(a => {
        const nk = norm(a.id);
        if (!retirementMap.hasOwnProperty(nk)) return a;
        matched++;
        return {
          ...a,
          status: "retired",
          retiredDate: retirementMap[nk] || "",
          ledgerFlag: true, // 減少明細にある = 台帳登録済みと見なす
        };
      }));

      setShowRetirementImport(false);
      showToast(`✅ 減少明細照合完了：${matched}件を除却済みに更新しました`);
    } catch (e) {
      showToast(`⚠️ 読み込みエラー：${e.message}`);
    }
  }


  function openNew() {
    setEditing(emptyAsset());
    setIsNew(true);
  }
  function openEdit(asset) {
    setEditing({ ...asset });
    setIsNew(false);
  }
  function closeEdit() {
    setEditing(null);
    setIsNew(false);
  }
  function saveEdit() {
    if (!editing.id.trim() || !editing.name.trim() || !editing.location.trim()) {
      showToast("型番・資産名・保管場所は必須です");
      return;
    }
    if (isNew) {
      if (assets.some(a => a.id === editing.id)) {
        showToast("この型番は既に登録されています");
        return;
      }
      setAssets(prev => [editing, ...prev]);
      showToast("資産を登録しました");
    } else {
      setAssets(prev => prev.map(a => (a.id === selectedId ? editing : a)));
      setSelectedId(editing.id);
      showToast("資産情報を更新しました");
    }
    closeEdit();
  }
  function deleteAsset(id) {
    setAssets(prev => prev.filter(a => a.id !== id));
    setSelectedId(null);
    showToast("資産を削除しました");
  }
  function toggleStorageFeePaid(id) {
    setAssets(prev => prev.map(a => a.id === id ? { ...a, storageFeePaid: !a.storageFeePaid } : a));
  }

  function toggleDisposalPending(id) {
    setAssets(prev => prev.map(a => a.id === id ? { ...a, disposalPending: !a.disposalPending } : a));
  }

  // Excelファイル（合意書・廃棄金型確認書）を読み込んで資産を追加取込する
  async function handleExcelUpload(file) {
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });

      // シートを選択（合意書系 or 廃棄金型確認書）
      const sheetName = wb.SheetNames.find(s =>
        s.includes("合意書") || s.includes("金型リスト") || s.includes("廃棄金型確認書")
      ) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

      // ヘッダー行を検索（資産番号列が含まれる行）
      let headerRowIdx = -1;
      for (let i = 0; i < Math.min(40, rows.length); i++) {
        const joined = rows[i].join(" ");
        if (joined.includes("資産番号") && (joined.includes("金型名称") || joined.includes("金型保管料"))) {
          headerRowIdx = i;
          break;
        }
      }
      if (headerRowIdx === -1) {
        showToast("⚠️ ヘッダー行が見つかりませんでした");
        return;
      }

      const header = rows[headerRowIdx];
      const assetCol = header.findIndex(h => String(h).includes("資産番号") && !String(h).includes("枝"));
      const nameCol = header.findIndex(h => String(h).includes("金型名称"));
      const makerCol = header.findIndex(h => String(h).includes("御社名"));
      const seriesCol = header.findIndex(h => String(h).includes("シリーズ"));
      const locationCol = header.findIndex(h => String(h).includes("金型所在地") || String(h).includes("所在地"));
      const priceCol = header.findIndex(h => String(h).includes("取得価額"));
      const sizeCol = header.findIndex(h => String(h).includes("サイズ"));
      const haibanCol = header.findIndex(h => String(h).includes("廃番か除却か"));

      const clean = v => (v === null || v === undefined || String(v).trim() === "" || String(v).trim() === "0") ? "" : String(v).trim();
      const cleanPrice = v => (typeof v === "number" && v !== 0) ? v : (parseFloat(v) || "");

      let added = 0, skipped = 0, unknownCount = 0;
      const existingIds = new Set(assets.map(a => a.id));

      const newAssets = [];
      for (let i = headerRowIdx + 1; i < rows.length; i++) {
        const r = rows[i];
        const nameRaw = clean(r[nameCol]);
        let assetNo = assetCol >= 0 ? clean(r[assetCol]) : "";
        if (!nameRaw && !assetNo) continue;
        if (!assetNo) {
          unknownCount++;
          assetNo = `不明-追加${unknownCount}`;
        }
        if (existingIds.has(assetNo)) { skipped++; continue; }

        const haiban = haibanCol >= 0 ? clean(r[haibanCol]) : "";
        const status = (haiban.includes("除却") || haiban.includes("金型廃棄済み")) ? "retired" : "in_use";

        newAssets.push({
          id: assetNo,
          name: nameRaw || "（名称未登録）",
          series: seriesCol >= 0 ? clean(r[seriesCol]) : "",
          location: locationCol >= 0 ? clean(r[locationCol]) : "（保管場所未登録）",
          maker: makerCol >= 0 ? clean(r[makerCol]) : "（サプライヤ未登録）",
          acquireDate: "",
          acquirePrice: priceCol >= 0 ? cleanPrice(r[priceCol]) : "",
          size: sizeCol >= 0 ? clean(r[sizeCol]) : "",
          status,
          disposalPending: false,
          ledgerFlag: false,
          usefulLife: "",
          nextMaintenance: "",
          history: "",
          lentTo: "",
          weight: "",
          moldType: "",
          storageFeeApplicable: true,
          storageFeePaid: false,
        });
        existingIds.add(assetNo);
        added++;
      }

      if (newAssets.length > 0) {
        setAssets(prev => [...prev, ...newAssets]);
      }
      setShowExcelUpload(false);
      showToast(`✅ ${added}件を追加しました（重複スキップ: ${skipped}件）`);
    } catch (e) {
      showToast(`⚠️ 読み込みエラー: ${e.message}`);
    }
  }

  if (!storageReady) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#F4F5F3", flexDirection: "column", gap: 12 }}>
        <div style={{ fontSize: 32 }}>⚙️</div>
        <div style={{ fontSize: 14, color: "#6B7280" }}>データを読み込み中...</div>
      </div>
    );
  }

  return (
    <div style={{
      fontFamily: "'Hiragino Sans', 'Yu Gothic', system-ui, sans-serif",
      background: "#F4F5F3", minHeight: "100vh", color: "#22282E",
    }}>
      <style>{`
        * { box-sizing: border-box; }
        input, select, textarea { font-family: inherit; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #c7ccd1; border-radius: 4px; }
        .focus-ring:focus { outline: 2px solid #2C6E49; outline-offset: 1px; }
      `}</style>

      {/* Header */}
      <header style={{
        background: "#1B2430", color: "#fff", padding: "16px 18px",
        position: "sticky", top: 0, zIndex: 20,
        boxShadow: "0 1px 0 rgba(0,0,0,0.08)",
      }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", maxWidth: 1100, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{
              width: 34, height: 34, borderRadius: 8, background: "#2C6E49",
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              <Package size={18} color="#fff" />
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 16, letterSpacing: 0.2 }}>金型管理台帳</div>
              <div style={{ fontSize: 11.5, color: "#9AA5B1" }}>試作版・ブラウザ内データ</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => setViewMode("cards")} aria-label="カード表示" style={{
              background: viewMode === "cards" ? "#2C6E49" : "transparent",
              border: "1px solid #3A4452", borderRadius: 7, padding: 7, color: "#fff", cursor: "pointer",
              display: "flex", alignItems: "center",
            }}><LayoutGrid size={16} /></button>
            <button onClick={() => setViewMode("table")} aria-label="表表示" style={{
              background: viewMode === "table" ? "#2C6E49" : "transparent",
              border: "1px solid #3A4452", borderRadius: 7, padding: 7, color: "#fff", cursor: "pointer",
              display: "flex", alignItems: "center",
            }}><ListIcon size={16} /></button>
          </div>
        </div>
      </header>

      <main style={{ maxWidth: 1100, margin: "0 auto", padding: "18px 16px 90px" }}>

        {/* Stat strip */}
        <div style={{
          display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 10, marginBottom: 16,
        }}>
          {[
            { label: "総資産数", value: stats.total, color: "#22282E" },
            { label: "固定資産", value: stats.fixed, color: "#8A5A1E" },
            { label: "非固定資産", value: stats.tentative, color: "#9A8226" },
            { label: "少額資産", value: stats.minor, color: "#2C547E" },
            { label: "不明", value: stats.unknown, color: "#6B6B6B" },
            { label: "除却済み", value: stats.retired, color: "#2C547E" },
            { label: "保管料未払い", value: stats.unpaidStorage, color: "#C9544A" },
          ].map((s, i) => (
            <div key={i} style={{
              background: "#fff", borderRadius: 10, padding: "12px 8px",
              border: "1px solid #E4E6E8", textAlign: "center",
            }}>
              <div style={{ fontSize: 20, fontWeight: 800, color: s.color }}>{s.value}</div>
              <div style={{ fontSize: 10.5, color: "#6B7280", marginTop: 2 }}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Fixed asset ledger import banner */}
        {stats.tentative > 0 && (
          <button onClick={() => setShowLedgerImport(true)} style={{
            width: "100%", display: "flex", alignItems: "center", gap: 10,
            background: "#FBF7EC", border: "1px dashed #D8C284", borderRadius: 10,
            padding: "11px 14px", marginBottom: 16, cursor: "pointer", textAlign: "left",
          }}>
            <FileSpreadsheet size={18} color="#9A8226" style={{ flexShrink: 0 }} />
            <div style={{ flex: 1, fontSize: 13, color: "#6B5A2A" }}>
              <strong>「非固定資産」が{stats.tentative}件あります。</strong>
              固定資産台帳データを投入すると、台帳に載っている型番が「固定資産」として確定されます。
            </div>
            <Upload size={16} color="#9A8226" style={{ flexShrink: 0 }} />
          </button>
        )}

        {/* Maintenance alert */}
        {upcomingMaintenance.length > 0 && (
          <div style={{
            background: "#FBF0E2", border: "1px solid #EFD8AC", borderRadius: 10,
            padding: "10px 14px", marginBottom: 16, display: "flex", gap: 10, alignItems: "flex-start",
          }}>
            <AlertTriangle size={18} color="#9A6418" style={{ flexShrink: 0, marginTop: 2 }} />
            <div style={{ fontSize: 13, lineHeight: 1.6 }}>
              <strong style={{ color: "#9A6418" }}>メンテナンス予定が近い資産が{upcomingMaintenance.length}件あります：</strong>
              <span style={{ color: "#5B5142" }}>
                {" "}{upcomingMaintenance.map(a => `${a.id}（${a.days <= 0 ? "期限超過" : `あと${a.days}日`}）`).join("、")}
              </span>
            </div>
          </div>
        )}

        {/* Search + filter bar */}
        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <div style={{
            flex: 1, display: "flex", alignItems: "center", gap: 8,
            background: "#fff", border: "1px solid #D8DBDE", borderRadius: 9, padding: "9px 12px",
          }}>
            <Search size={16} color="#8A929B" />
            <input
              className="focus-ring"
              value={query}
              onChange={e => setQuery(e.target.value)}
              placeholder="型番・資産名・保管場所・サプライヤ名で検索"
              style={{ border: "none", outline: "none", flex: 1, fontSize: 14, background: "transparent" }}
            />
          </div>
          <button onClick={() => setShowFilters(v => !v)} style={{
            display: "flex", alignItems: "center", gap: 6, background: showFilters ? "#22282E" : "#fff",
            color: showFilters ? "#fff" : "#22282E", border: "1px solid #D8DBDE", borderRadius: 9,
            padding: "9px 14px", fontSize: 13.5, fontWeight: 600, cursor: "pointer", position: "relative",
          }}>
            <Filter size={15} /> 絞込
            {activeFilterCount > 0 && (
              <span style={{
                position: "absolute", top: -6, right: -6, background: "#2C6E49", color: "#fff",
                fontSize: 10.5, fontWeight: 700, borderRadius: 100, minWidth: 17, height: 17,
                display: "flex", alignItems: "center", justifyContent: "center", padding: "0 4px",
              }}>{activeFilterCount}</span>
            )}
          </button>
          <button onClick={exportToExcel} style={{
            display: "flex", alignItems: "center", gap: 6, background: "#fff", color: "#22282E",
            border: "1px solid #D8DBDE", borderRadius: 9, padding: "9px 14px", fontSize: 13.5, fontWeight: 600, cursor: "pointer",
          }} title={`現在の絞り込み結果（${filtered.length}件）をExcel出力`}>
            <Download size={15} /> Excel出力{activeFilterCount > 0 ? `（${filtered.length}件）` : ""}
          </button>
          <button onClick={() => setShowExcelUpload(true)} style={{
            display: "flex", alignItems: "center", gap: 6, background: "#fff", color: "#22282E",
            border: "1px solid #D8DBDE", borderRadius: 9, padding: "9px 14px", fontSize: 13.5, fontWeight: 600, cursor: "pointer",
          }}>
            <Upload size={15} /> Excel取込
          </button>
          <button onClick={() => setShowRetirementImport(true)} style={{
            display: "flex", alignItems: "center", gap: 6, background: "#fff", color: "#22282E",
            border: "1px solid #D8DBDE", borderRadius: 9, padding: "9px 14px", fontSize: 13.5, fontWeight: 600, cursor: "pointer",
          }}>
            <Trash2 size={15} /> 減少明細
          </button>
          <button onClick={openNew} style={{
            display: "flex", alignItems: "center", gap: 6, background: "#2C6E49", color: "#fff",
            border: "none", borderRadius: 9, padding: "9px 16px", fontSize: 13.5, fontWeight: 700, cursor: "pointer",
          }}>
            <Plus size={16} /> 新規登録
          </button>
        </div>

        {showFilters && (
          <div style={{
            background: "#fff", border: "1px solid #E4E6E8", borderRadius: 10, padding: 14, marginBottom: 16,
            display: "flex", gap: 18, flexWrap: "wrap",
          }}>
            <div>
              <div style={{ fontSize: 11.5, color: "#6B7280", marginBottom: 6, fontWeight: 600 }}>ステータス</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <FilterChip active={statusFilter.length === 0} onClick={() => setStatusFilter([])} label="すべて" />
                {Object.entries(STATUS).map(([k, v]) => (
                  <FilterChip key={k} active={statusFilter.includes(k)} onClick={() => toggleFilterValue(setStatusFilter, k)} label={v.label} />
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 11.5, color: "#6B7280", marginBottom: 6, fontWeight: 600 }}>資産区分</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <FilterChip active={categoryFilter.length === 0} onClick={() => setCategoryFilter([])} label="すべて" />
                {Object.entries(CATEGORY).map(([k, v]) => (
                  <FilterChip key={k} active={categoryFilter.includes(k)} onClick={() => toggleFilterValue(setCategoryFilter, k)} label={v.label} />
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 11.5, color: "#6B7280", marginBottom: 6, fontWeight: 600 }}>サプライヤ名</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <FilterChip active={supplierFilter.length === 0} onClick={() => setSupplierFilter([])} label="すべて" />
                {availableSuppliers.map(s => (
                  <FilterChip key={s} active={supplierFilter.includes(s)} onClick={() => toggleFilterValue(setSupplierFilter, s)} label={s} />
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 11.5, color: "#6B7280", marginBottom: 6, fontWeight: 600 }}>保管料</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <FilterChip active={storageFeeFilter.length === 0} onClick={() => setStorageFeeFilter([])} label="すべて" />
                <FilterChip active={storageFeeFilter.includes("paid")} onClick={() => toggleFilterValue(setStorageFeeFilter, "paid")} label="支払済み" />
                <FilterChip active={storageFeeFilter.includes("unpaid")} onClick={() => toggleFilterValue(setStorageFeeFilter, "unpaid")} label="未払い" />
              </div>
            </div>
          </div>
        )}

        <div style={{ fontSize: 12.5, color: "#6B7280", marginBottom: 10 }}>
          {filtered.length} 件表示中（全 {assets.length} 件）
        </div>

        {/* List */}
        {viewMode === "cards" ? (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 10 }}>
            {filtered.map((a, idx) => (
              <AssetCard key={`${a.id}-${idx}`} asset={a} onClick={() => setSelectedId(a.id)} />
            ))}
          </div>
        ) : (
          <TableView assets={filtered} onSelect={setSelectedId} />
        )}

        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: "50px 0", color: "#9AA5B1" }}>
            <Package size={36} style={{ marginBottom: 10, opacity: 0.5 }} />
            <div style={{ fontSize: 14 }}>該当する資産が見つかりません</div>
          </div>
        )}
      </main>

      {/* Detail panel */}
      {selectedAsset && !editing && (
        <DetailPanel
          asset={selectedAsset}
          onClose={() => setSelectedId(null)}
          onEdit={() => openEdit(selectedAsset)}
          onDelete={() => deleteAsset(selectedAsset.id)}
          onToggleStorageFeePaid={toggleStorageFeePaid}
          onToggleDisposalPending={toggleDisposalPending}
        />
      )}

      {/* Edit/Create panel */}
      {editing && (
        <EditPanel
          asset={editing}
          isNew={isNew}
          onChange={setEditing}
          onClose={closeEdit}
          onSave={saveEdit}
        />
      )}

      {/* Fixed asset ledger import modal */}
      {showRetirementImport && (
        <RetirementImportModal
          onClose={() => setShowRetirementImport(false)}
          onUpload={importRetirementFile}
        />
      )}
      {showExcelUpload && (
        <ExcelUploadModal
          onClose={() => setShowExcelUpload(false)}
          onUpload={handleExcelUpload}
        />
      )}
      {showLedgerImport && (
        <LedgerImportModal
          tentativeCount={stats.tentative}
          onClose={() => setShowLedgerImport(false)}
          onUpload={importLedgerFile}
        />
      )}

      {/* Toast */}
      {toast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: "#22282E", color: "#fff", padding: "10px 18px", borderRadius: 8,
          fontSize: 13.5, zIndex: 100, boxShadow: "0 4px 14px rgba(0,0,0,0.2)",
        }}>
          {toast}
        </div>
      )}
    </div>
  );
}

function FilterChip({ active, onClick, label }) {
  return (
    <button onClick={onClick} style={{
      fontSize: 12.5, padding: "5px 12px", borderRadius: 100, cursor: "pointer",
      border: active ? "1px solid #2C6E49" : "1px solid #D8DBDE",
      background: active ? "#2C6E49" : "#fff",
      color: active ? "#fff" : "#4B5563", fontWeight: 600,
    }}>
      {label}
    </button>
  );
}

function AssetCard({ asset, onClick }) {
  const days = daysUntil(asset.nextMaintenance);
  const category = resolveCategory(asset);
  const isDisposal = !!asset.disposalPending;
  const isLedgerRetired = !!asset.retiredDate; // 減少明細上の除却済み
  return (
    <button onClick={onClick} style={{
      textAlign: "left",
      background: isLedgerRetired ? "#FFFDE7" : isDisposal ? "#FFAB5E" : "#fff",
      border: `1px solid ${isLedgerRetired ? "#F9C94E" : isDisposal ? "#E07820" : "#E4E6E8"}`,
      borderRadius: 11,
      padding: 14, cursor: "pointer", display: "flex", flexDirection: "column", gap: 8,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontSize: 11.5, color: "#8A929B", fontWeight: 600, marginBottom: 2 }}>{asset.id}</div>
          <div style={{ fontSize: 14.5, fontWeight: 700, color: "#22282E", lineHeight: 1.3 }}>{asset.name}</div>
        </div>
        <StatusBadge status={asset.status} disposalPending={asset.disposalPending} />
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, color: "#5B6470" }}>
        <MapPin size={13} /> {asset.location}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 2 }}>
        <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
          <CategoryTag category={category} />
          {isLedgerRetired && (
            <span style={{
              display: "inline-flex", alignItems: "center", gap: 3,
              fontSize: 11, fontWeight: 700, color: "#7A6000",
              background: "#FFF8C5", border: "1px solid #F9C94E",
              borderRadius: 4, padding: "2px 6px",
            }}>
              減少明細上除却済み
            </span>
          )}
          {asset.storageFeeApplicable && (
            asset.storageFeePaid
              ? <span style={{
                  display: "inline-flex", alignItems: "center", gap: 3,
                  fontSize: 11, fontWeight: 700, color: "#1F6B3C",
                  background: "#E8F3EC", border: "1px solid #BFE0CB",
                  borderRadius: 4, padding: "2px 6px",
                }}>
                  <CheckSquare size={11} color="#1F6B3C" /> 保管料支払済み
                </span>
              : <Square size={14} color="#C9544A" />
          )}
        </div>
        {days !== null && (
          <span style={{ fontSize: 11.5, color: days <= 7 ? "#C9544A" : "#8A929B", fontWeight: 600 }}>
            次回点検 {days <= 0 ? "期限超過" : `あと${days}日`}
          </span>
        )}
      </div>
    </button>
  );
}

function TableView({ assets, onSelect }) {
  return (
    <div style={{ background: "#fff", border: "1px solid #E4E6E8", borderRadius: 11, overflow: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead>
          <tr style={{ background: "#F4F5F3", textAlign: "left" }}>
            {["型番", "資産名", "保管場所", "区分", "ステータス", "保管料"].map(h => (
              <th key={h} style={{ padding: "10px 12px", fontWeight: 700, color: "#5B6470", borderBottom: "1px solid #E4E6E8", whiteSpace: "nowrap" }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {assets.map((a, idx) => (
            <tr key={`${a.id}-${idx}`} onClick={() => onSelect(a.id)} style={{ cursor: "pointer", borderBottom: "1px solid #EEF0F1" }}
              onMouseEnter={e => e.currentTarget.style.background = "#FAFAF9"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              <td style={{ padding: "10px 12px", fontWeight: 600, whiteSpace: "nowrap" }}>{a.id}</td>
              <td style={{ padding: "10px 12px" }}>{a.name}</td>
              <td style={{ padding: "10px 12px", color: "#5B6470", whiteSpace: "nowrap" }}>{a.location}</td>
              <td style={{ padding: "10px 12px" }}><CategoryTag category={resolveCategory(a)} /></td>
              <td style={{ padding: "10px 12px" }}><StatusBadge status={a.status} disposalPending={a.disposalPending} /></td>
              <td style={{ padding: "10px 12px" }}>
                {a.storageFeeApplicable ? (
                  a.storageFeePaid
                    ? <span style={{ display: "flex", alignItems: "center", gap: 4, color: "#1F6B3C", fontWeight: 600, fontSize: 12 }}><CheckSquare size={14} />支払済み</span>
                    : <span style={{ display: "flex", alignItems: "center", gap: 4, color: "#C9544A", fontWeight: 600, fontSize: 12 }}><Square size={14} />未払い</span>
                ) : <span style={{ color: "#C7CBCF", fontSize: 12 }}>対象外</span>}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function Row({ icon, label, value }) {
  return (
    <div style={{ display: "flex", gap: 10, padding: "9px 0", borderBottom: "1px solid #F0F1F2" }}>
      <div style={{ width: 18, color: "#9AA5B1", flexShrink: 0, marginTop: 1 }}>{icon}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 11.5, color: "#8A929B" }}>{label}</div>
        <div style={{ fontSize: 14, color: "#22282E", marginTop: 1, whiteSpace: "pre-wrap" }}>{value || "—"}</div>
      </div>
    </div>
  );
}

function PanelShell({ children, onClose, footer }) {
  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(20,24,28,0.45)", zIndex: 50,
      display: "flex", justifyContent: "flex-end",
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: "min(440px, 100%)", height: "100%", background: "#fff",
        display: "flex", flexDirection: "column", boxShadow: "-6px 0 24px rgba(0,0,0,0.12)",
      }}>
        <div style={{ flex: 1, overflowY: "auto", padding: "18px 20px 20px" }}>
          {children}
        </div>
        {footer && (
          <div style={{ padding: "14px 20px", borderTop: "1px solid #EEF0F1", flexShrink: 0 }}>
            {footer}
          </div>
        )}
      </div>
    </div>
  );
}

function DetailPanel({ asset, onClose, onEdit, onDelete, onToggleStorageFeePaid, onToggleDisposalPending }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  const category = resolveCategory(asset);
  return (
    <PanelShell
      onClose={onClose}
      footer={
        confirmDelete ? (
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setConfirmDelete(false)} style={btnSecondary}>キャンセル</button>
            <button onClick={onDelete} style={{ ...btnSecondary, background: "#C9544A", color: "#fff", borderColor: "#C9544A", flex: 1 }}>削除を確定</button>
          </div>
        ) : (
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setConfirmDelete(true)} style={{ ...btnSecondary, color: "#C9544A" }}>
              <Trash2 size={15} /> 削除
            </button>
            <button onClick={onEdit} style={{ ...btnPrimary, flex: 1 }}>
              <Edit3 size={15} /> 編集する
            </button>
          </div>
        )
      }
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
        <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#8A929B", padding: 4, marginLeft: -4 }}>
          <ArrowLeft size={20} />
        </button>
      </div>
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 12, color: "#8A929B", fontWeight: 600 }}>{asset.id}</div>
        <div style={{ fontSize: 19, fontWeight: 800, color: "#22282E", marginTop: 2 }}>{asset.name}</div>
        <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
          <StatusBadge status={asset.status} disposalPending={asset.disposalPending} />
          <CategoryTag category={category} />
        </div>
      </div>

      <SectionLabel text="基本情報" />
      {asset.seriesName && <Row icon={<Tag size={15} />} label="商品シリーズ" value={asset.seriesName} />}
      <Row icon={<MapPin size={15} />} label="保管場所" value={asset.location} />
      <Row icon={<Building2 size={15} />} label="サプライヤ名" value={asset.maker} />
      {asset.status === "in_use" && <Row icon={<Tag size={15} />} label="貸出先・使用中の現場" value={asset.lentTo} />}

      <SectionLabel text="仕様情報" />
      <Row icon={<Ruler size={15} />} label="サイズ" value={asset.size} />
      <Row icon={<Weight size={15} />} label="重量" value={asset.weight ? `${asset.weight} kg` : ""} />
      <Row icon={<Tag size={15} />} label="型のタイプ" value={asset.moldType} />

      {category !== "minor" && (
        <>
          <SectionLabel text="固定資産情報" />
          <Row icon={<Calendar size={15} />} label="取得日" value={asset.acquireDate} />
          <Row icon={<Tag size={15} />} label="取得価格" value={yen(asset.acquirePrice)} />
          <Row icon={<Tag size={15} />} label="耐用年数" value={asset.usefulLife ? `${asset.usefulLife} 年` : ""} />
        </>
      )}

      {asset.storageFeeApplicable && (
        <>
          <SectionLabel text="保管料" />
          <button onClick={() => onToggleStorageFeePaid(asset.id)} style={{
            display: "flex", alignItems: "center", gap: 8, width: "100%",
            background: asset.storageFeePaid ? "#E8F3EC" : "#F8E8E6",
            border: `1px solid ${asset.storageFeePaid ? "#BFE0CB" : "#EFC7C2"}`,
            borderRadius: 8, padding: "10px 12px", cursor: "pointer", marginTop: 4,
          }}>
            {asset.storageFeePaid
              ? <CheckSquare size={18} color="#1F6B3C" />
              : <Square size={18} color="#9B3A30" />}
            <span style={{ fontSize: 13.5, fontWeight: 600, color: asset.storageFeePaid ? "#1F6B3C" : "#9B3A30" }}>
              保管料 {asset.storageFeePaid ? "支払済み" : "未払い"}（タップで切替）
            </span>
          </button>
        </>
      )}

      {asset.disposalPending && (
        <div style={{
          marginTop: 12, background: "#F8E8E6", border: "1px solid #EFC7C2",
          borderRadius: 8, padding: "10px 12px", display: "flex", alignItems: "center", gap: 8,
        }}>
          <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#C9544A", flexShrink: 0 }} />
          <span style={{ fontSize: 13.5, fontWeight: 600, color: "#9B3A30" }}>
            廃棄予定（サプライヤからの廃棄回答あり）
          </span>
        </div>
      )}

      <SectionLabel text="廃棄予定" />
      <button onClick={() => onToggleDisposalPending(asset.id)} style={{
        display: "flex", alignItems: "center", gap: 8, width: "100%",
        background: asset.disposalPending ? "#F8E8E6" : "#F6F7F8",
        border: `1px solid ${asset.disposalPending ? "#EFC7C2" : "#D8DBDE"}`,
        borderRadius: 8, padding: "10px 12px", cursor: "pointer", marginTop: 4,
      }}>
        {asset.disposalPending
          ? <CheckSquare size={18} color="#9B3A30" />
          : <Square size={18} color="#8A929B" />}
        <span style={{ fontSize: 13.5, fontWeight: 600, color: asset.disposalPending ? "#9B3A30" : "#6B7280" }}>
          廃棄予定{asset.disposalPending ? "（回答あり）" : "（未回答）"}（タップで切替）
        </span>
      </button>

      <SectionLabel text="メンテナンス情報" />
      {asset.retiredDate && (
        <Row icon={<Calendar size={15} />} label="除却日" value={asset.retiredDate} />
      )}
      <Row icon={<Calendar size={15} />} label="次回メンテナンス予定日" value={asset.nextMaintenance} />
      <Row icon={<Wrench size={15} />} label="修理・メンテナンス履歴" value={asset.history} />
    </PanelShell>
  );
}

function SectionLabel({ text }) {
  return (
    <div style={{
      fontSize: 11.5, fontWeight: 700, color: "#2C6E49", marginTop: 18, marginBottom: 4,
      textTransform: "uppercase", letterSpacing: 0.4,
    }}>
      {text}
    </div>
  );
}

const inputStyle = {
  width: "100%", border: "1px solid #D8DBDE", borderRadius: 7, padding: "9px 10px",
  fontSize: 14, outline: "none", marginTop: 4,
};
const labelStyle = { fontSize: 12, color: "#5B6470", fontWeight: 600 };
const btnPrimary = {
  display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
  background: "#2C6E49", color: "#fff", border: "none", borderRadius: 8,
  padding: "11px 14px", fontSize: 14, fontWeight: 700, cursor: "pointer",
};
const btnSecondary = {
  display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
  background: "#fff", color: "#22282E", border: "1px solid #D8DBDE", borderRadius: 8,
  padding: "11px 14px", fontSize: 14, fontWeight: 600, cursor: "pointer",
};

function Field({ label, children }) {
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={labelStyle}>{label}</div>
      {children}
    </div>
  );
}

function EditPanel({ asset, isNew, onChange, onClose, onSave }) {
  const set = (k, v) => onChange({ ...asset, [k]: v });
  const category = resolveCategory(asset);
  return (
    <PanelShell
      onClose={onClose}
      footer={
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onClose} style={btnSecondary}>キャンセル</button>
          <button onClick={onSave} style={{ ...btnPrimary, flex: 1 }}>
            <Save size={15} /> 保存する
          </button>
        </div>
      }
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 17, fontWeight: 800 }}>{isNew ? "資産を新規登録" : "資産情報を編集"}</div>
        <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#8A929B" }}>
          <X size={20} />
        </button>
      </div>

      <SectionLabel text="基本情報" />
      <Field label="型番 *">
        <input style={inputStyle} value={asset.id} disabled={!isNew}
          onChange={e => set("id", e.target.value)}
          placeholder="例：M-1001" />
        {!isNew && <div style={{ fontSize: 11, color: "#9AA5B1", marginTop: 3 }}>型番は登録後変更できません</div>}
      </Field>
      <Field label="資産名（製品名・部品名） *">
        <input style={inputStyle} value={asset.name} onChange={e => set("name", e.target.value)} />
      </Field>
      <Field label="商品シリーズ">
        <input style={inputStyle} value={asset.seriesName || ""} onChange={e => set("seriesName", e.target.value)}
          placeholder="例：アイプラス、コプト" />
      </Field>
      <Field label="保管場所 *">
        <input style={inputStyle} value={asset.location} onChange={e => set("location", e.target.value)} list="loc-list" />
        <datalist id="loc-list">{LOCATIONS.map(l => <option key={l} value={l} />)}</datalist>
      </Field>
      <Field label="サプライヤ名">
        <input style={inputStyle} value={asset.maker} onChange={e => set("maker", e.target.value)} list="maker-list" />
        <datalist id="maker-list">{SUPPLIERS.map(m => <option key={m} value={m} />)}</datalist>
      </Field>

      <SectionLabel text="資産区分・状態" />
      <Field label="資産区分（自動判定）">
        <div style={{
          display: "flex", alignItems: "center", gap: 8, padding: "9px 10px", marginTop: 4,
          background: "#F4F5F3", borderRadius: 7, border: "1px solid #E4E6E8",
        }}>
          <CategoryTag category={category} />
          <span style={{ fontSize: 11.5, color: "#8A929B" }}>{CATEGORY[category].sub}</span>
        </div>
      </Field>
      <Field label="">
        <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
          <input type="checkbox" checked={asset.ledgerFlag}
            onChange={e => set("ledgerFlag", e.target.checked)}
            style={{ width: 16, height: 16 }} />
          <span style={{ fontSize: 13.5 }}>固定資産台帳に登録済み（台帳投入で自動的にONになります）</span>
        </label>
      </Field>
      <Field label="ステータス">
        <select style={inputStyle} value={asset.status} onChange={e => set("status", e.target.value)}>
          {Object.entries(STATUS).filter(([k]) => k !== "disposal").map(([k, v]) => (
            <option key={k} value={k}>{v.label}</option>
          ))}
        </select>
      </Field>
      {asset.status === "in_use" && (
        <Field label="貸出先・使用中の現場">
          <input style={inputStyle} value={asset.lentTo} onChange={e => set("lentTo", e.target.value)} />
        </Field>
      )}
      <Field label="">
        <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
          <input type="checkbox" checked={!!asset.disposalPending}
            onChange={e => set("disposalPending", e.target.checked)}
            style={{ width: 16, height: 16, accentColor: "#C9544A" }} />
          <span style={{ fontSize: 13.5, color: asset.disposalPending ? "#9B3A30" : undefined, fontWeight: asset.disposalPending ? 600 : undefined }}>
            廃棄予定（サプライヤからの廃棄回答あり）
          </span>
        </label>
        <div style={{ fontSize: 11.5, color: "#9AA5B1", marginTop: 4 }}>
          チェックを入れると一覧で「廃棄予定」として表示されます
        </div>
      </Field>

      <SectionLabel text="保管料" />
      <Field label="">
        <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
          <input type="checkbox" checked={asset.storageFeeApplicable}
            onChange={e => set("storageFeeApplicable", e.target.checked)}
            style={{ width: 16, height: 16 }} />
          <span style={{ fontSize: 13.5 }}>この資産は保管料が発生する（他社所有・貸出中など）</span>
        </label>
      </Field>
      {asset.storageFeeApplicable && (
        <Field label="">
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
            <input type="checkbox" checked={asset.storageFeePaid}
              onChange={e => set("storageFeePaid", e.target.checked)}
              style={{ width: 16, height: 16 }} />
            <span style={{ fontSize: 13.5 }}>保管料 支払済み</span>
          </label>
        </Field>
      )}

      <SectionLabel text="仕様情報" />
      <Field label="サイズ">
        <input style={inputStyle} value={asset.size} onChange={e => set("size", e.target.value)} placeholder="例：W500×D400×H300mm" />
      </Field>
      <Field label="重量(kg)">
        <input style={inputStyle} type="number" value={asset.weight} onChange={e => set("weight", e.target.value)} />
      </Field>
      <Field label="型のタイプ">
        <select style={inputStyle} value={asset.moldType} onChange={e => set("moldType", e.target.value)}>
          <option value="">選択してください</option>
          {TYPES.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
      </Field>

      <SectionLabel text="固定資産情報" />
      <p style={{ fontSize: 11.5, color: "#9AA5B1", margin: "0 0 8px" }}>
        取得価格が20万円以上の場合、台帳投入前は「非固定資産」として扱われます。
      </p>
      <Field label="取得日">
        <input style={inputStyle} type="date" value={asset.acquireDate} onChange={e => set("acquireDate", e.target.value)} />
      </Field>
      <Field label="取得価格（円）">
        <input style={inputStyle} type="number" value={asset.acquirePrice} onChange={e => set("acquirePrice", e.target.value)} />
      </Field>
      <Field label="耐用年数（年）">
        <input style={inputStyle} type="number" value={asset.usefulLife} onChange={e => set("usefulLife", e.target.value)} />
      </Field>

      <SectionLabel text="メンテナンス情報" />
      <Field label="次回メンテナンス予定日">
        <input style={inputStyle} type="date" value={asset.nextMaintenance} onChange={e => set("nextMaintenance", e.target.value)} />
      </Field>
      <Field label="修理・メンテナンス履歴">
        <textarea style={{ ...inputStyle, minHeight: 80, resize: "vertical" }}
          value={asset.history} onChange={e => set("history", e.target.value)}
          placeholder="例：2025-11-02 摩耗部研磨修理" />
      </Field>
    </PanelShell>
  );
}

function RetirementImportModal({ onClose, onUpload }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = React.useRef();
  const handleFile = file => {
    if (!file) return;
    if (!file.name.match(/\.(xlsx|xlsm|xls)$/i)) { alert("Excelファイルを選択してください"); return; }
    onUpload(file);
  };
  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(20,24,28,0.5)", zIndex: 60,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 16,
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: "min(460px, 100%)", background: "#fff", borderRadius: 14,
        boxShadow: "0 12px 32px rgba(0,0,0,0.2)", padding: 20,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <Trash2 size={20} color="#C9544A" />
            <div style={{ fontSize: 16.5, fontWeight: 800 }}>資産減少明細を投入</div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#8A929B" }}>
            <X size={20} />
          </button>
        </div>
        <p style={{ fontSize: 12.5, color: "#6B7280", marginBottom: 14, lineHeight: 1.6 }}>
          会計システムから出力した固定資産減少明細（2012〜2025年分）をアップロードしてください。
          一致した型番の資産を「除却済み」に更新し、除却日を記録します。複数年シートをまとめた形式に対応しています。
        </p>
        <div
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={e => { e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]); }}
          onClick={() => inputRef.current.click()}
          style={{
            border: `2px dashed ${dragging ? "#C9544A" : "#D8DBDE"}`,
            borderRadius: 10, padding: "32px 16px", textAlign: "center", cursor: "pointer",
            background: dragging ? "#FDF0EF" : "#F6F7F8", transition: "all 0.15s",
          }}
        >
          <Trash2 size={28} color={dragging ? "#C9544A" : "#9AA5B1"} style={{ marginBottom: 8 }} />
          <div style={{ fontSize: 13.5, color: "#6B7280" }}>
            減少明細ファイルをここにドロップ<br />
            <span style={{ color: "#C9544A", fontWeight: 600 }}>またはクリックして選択</span>
          </div>
          <div style={{ fontSize: 11.5, color: "#9AA5B1", marginTop: 8 }}>.xlsx / .xlsm 対応</div>
        </div>
        <input ref={inputRef} type="file" accept=".xlsx,.xlsm,.xls" style={{ display: "none" }}
          onChange={e => handleFile(e.target.files[0])} />
        <button onClick={onClose} style={{ marginTop: 14, width: "100%", padding: "10px", border: "1px solid #D8DBDE", borderRadius: 8, background: "#fff", cursor: "pointer", fontSize: 13.5 }}>
          キャンセル
        </button>
      </div>
    </div>
  );
}
